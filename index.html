<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Pokémon Generator</title>
    <meta name="description" content="Get a random Pokémon name and pixel art sprite with a single click.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="header-top fixed-top-right">
        <div class="shop-container" id="shop-container">
            <div class="shop-title">Poke Mart</div>
            <div class="shop-items" id="shop-items-container">
                <!-- Shop items injected here -->
            </div>
        </div>
    </div>

    <div class="header-bottom fixed-bottom-right">
        <div class="currency-container">
            <div class="currency-badge">
                <span class="currency-icon">₽</span>
                <span id="player-currency">--</span>
            </div>
        </div>
    </div>

    <div class="fixed-bottom-left">
        <div class="ball-inventory">
            <div class="ball-slot active" data-ball="POKEBALL">
                <div class="ball-icon poke-ball"></div>
                <span class="ball-count-overlay" id="count-POKEBALL">20</span>
            </div>
            <div class="ball-slot" data-ball="GREATBALL">
                <div class="ball-icon great-ball"></div>
                <span class="ball-count-overlay" id="count-GREATBALL">0</span>
            </div>
            <div class="ball-slot" data-ball="ULTRABALL">
                <div class="ball-icon ultra-ball"></div>
                <span class="ball-count-overlay" id="count-ULTRABALL">0</span>
            </div>
            <div class="ball-slot" data-ball="MASTERBALL">
                <div class="ball-icon master-ball"></div>
                <span class="ball-count-overlay" id="count-MASTERBALL">0</span>
            </div>
        </div>
    </div>

    <div class="container">
        <nav class="tabs" id="main-tabs">
            <button class="tab-btn active" data-tab="generator-tab">Encounter</button>
            <button class="tab-btn" data-tab="storage-tab">PC Storage</button>
            <button class="tab-btn" data-tab="items-tab">Items</button>
            <button class="tab-btn" data-tab="map-tab">Map</button>
            <button class="tab-btn" data-tab="deck-tab">Deck</button>
            <button class="tab-btn" data-tab="battle-tab">Battle</button>
        </nav>

        <header class="main-header">
            <h1 id="tab-header">Encounter</h1>
        </header>

        <div id="generator-tab" class="tab-content active-content">

            <div class="status-container">
                <div class="status-box">
                    <span class="label">Location:</span>
                    <select id="location-select" class="location-dropdown">
                        <!-- Locations injected here -->
                    </select>
                </div>
            </div>

            <main class="card" id="pokemon-card">
                <div class="sprite-container">
                    <div class="sprite-background"></div>
                    <div id="loader" class="loader hidden"></div>
                    <div id="catch-feedback-container" class="hidden">
                        <div id="catch-feedback"></div>
                    </div>
                    <img id="pokemon-sprite"
                        src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png"
                        alt="Mystery Pokémon" class="sprite">
                </div>

                <div class="info-container">
                    <div class="id-badge">#<span id="pokemon-id">???</span></div>
                    <h2 id="pokemon-name">???</h2>
                    <div id="pokemon-types" class="types-container">
                        <!-- Types will be injected here -->
                    </div>
                    <div id="pokemon-ability-container" class="ability-container hidden">
                        <span class="ability-label">Ability:</span>
                        <span id="pokemon-ability" class="ability-name">---</span>
                    </div>
                </div>
            </main>

            <div class="action-buttons">
                <button id="catch-btn" class="primary-btn" disabled>Catch</button>
                <button id="generate-btn" class="primary-btn">
                    <span class="btn-text">Find Next</span>
                    <div class="btn-glow"></div>
                </button>
            </div>
        </div>

        <div id="storage-tab" class="tab-content hidden">
            <div id="storage-grid" class="storage-grid">
                <!-- Pokémon will be injected here -->
            </div>
            <div class="pagination">
                <button id="prev-page" class="tab-btn">Prev</button>
                <span id="page-info">Page 1</span>
                <button id="next-page" class="tab-btn">Next</button>
            </div>
        </div>

        <div id="items-tab" class="tab-content hidden">
            <div class="coming-soon">
                <p>Coming Soon...</p>
            </div>
        </div>

        <div id="map-tab" class="tab-content hidden">
            <div class="map-header">
                <div class="map-stats">
                    <span id="day-counter">Day 1</span>
                    <span id="energy-counter">Energy 20/20</span>
                </div>
                <div class="map-materials">
                    <span id="mat-wood" class="mat-badge wood">Wood: 0</span>
                    <span id="mat-stone" class="mat-badge stone">Stone: 0</span>
                </div>
                <div class="map-actions">
                    <button id="daily-reward-btn" class="secondary-btn">Claim Tile</button>
                    <button id="sleep-btn" class="secondary-btn">Sleep</button>
                </div>
            </div>

            <div class="map-wrapper">
                <div id="map-grid" class="map-grid">
                    <!-- Tiles injected via JS -->
                </div>
                <div id="player-character" class="player-character"></div>
            </div>
            
            <div class="map-controls">
                <div class="controls-hint">Use Arrow Keys or WASD to move</div>
            </div>

            <!-- Daily Reward Modal overlay -->
            <div id="daily-modal" class="modal-overlay hidden">
                <div class="modal-content">
                    <h3>Choose a Tile</h3>
                    <div id="daily-tiles-container" class="daily-tiles">
                        <!-- Tiles injected here -->
                    </div>
                    <button id="daily-skip-btn" class="secondary-btn">Skip for now</button>
                </div>
            </div>
        </div>

        <div id="deck-tab" class="tab-content hidden">
            <div class="deck-header">
                <span class="deck-title">Tile Deck</span>
                <span id="deck-count-label" class="deck-count">0 tiles</span>
            </div>
            <div id="deck-grid" class="deck-grid">
                <!-- Tile cards injected via JS -->
            </div>
            <div class="pagination" id="deck-pagination">
                <button id="deck-prev" class="tab-btn">Prev</button>
                <span id="deck-page-info">Page 1</span>
                <button id="deck-next" class="tab-btn">Next</button>
            </div>
        </div>

        <div id="battle-tab" class="tab-content hidden">
            <div class="battle-arena">
                <div class="battle-box player-side">
                    <div class="stat-box">
                        <div class="stat-header">
                            <span class="pokemon-name" id="player-name">???</span>
                            <span class="pokemon-level">Lv50</span>
                        </div>
                        <div class="hp-bar-container">
                            <div class="hp-bar-label">HP</div>
                            <div class="hp-bar-track">
                                <div class="hp-bar-fill" id="player-hp" style="width: 100%;"></div>
                            </div>
                            <div class="hp-text" id="player-hp-text">100/100</div>
                        </div>
                        <div class="debuff-area" id="player-debuffs">
                            <!-- Debuff icons -->
                        </div>
                    </div>
                    <div class="sprite-stage player-stage">
                        <img id="player-sprite" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" class="battle-sprite back-sprite" alt="Player">
                    </div>
                </div>

                <div class="battle-box enemy-side">
                    <div class="stat-box">
                        <div class="stat-header">
                            <span class="pokemon-name" id="enemy-name">???</span>
                            <span class="pokemon-level">Lv50</span>
                        </div>
                        <div class="hp-bar-container">
                            <div class="hp-bar-label">HP</div>
                            <div class="hp-bar-track">
                                <div class="hp-bar-fill" id="enemy-hp" style="width: 100%;"></div>
                            </div>
                            <div class="hp-text" id="enemy-hp-text">100/100</div>
                        </div>
                        <div class="debuff-area" id="enemy-debuffs">
                            <!-- Debuff icons -->
                        </div>
                    </div>
                    <div class="sprite-stage enemy-stage">
                        <img id="enemy-sprite" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" class="battle-sprite front-sprite" alt="Enemy">
                    </div>
                </div>
            </div>
            
            <div class="action-buttons">
                <button id="start-battle-btn" class="primary-btn">
                    <span class="btn-text">Test Battle</span>
                    <div class="btn-glow"></div>
                </button>
            </div>
        </div>

    </div>

    <audio id="pokemon-cry" preload="auto"></audio>

    <script type="module" src="/script.ts"></script>
</body>

</html>
