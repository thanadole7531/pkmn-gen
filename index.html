<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Pokémon Generator</title>
    <meta name="description" content="Get a random Pokémon name and pixel art sprite with a single click.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="header-top fixed-top-right">
        <div class="currency-badge">
            <span class="currency-icon">₽</span>
            <span id="player-currency">--</span>
        </div>
    </div>

    <div class="fixed-bottom-left">
        <div class="ball-badge">
            <span id="current-ball-name" class="label">Poké Ball</span>
            <span id="ball-count" class="value">--</span>
        </div>
    </div>

    <div class="container">
        <nav class="tabs" id="main-tabs">
            <button class="tab-btn active" data-tab="generator-tab">Encounter</button>
            <button class="tab-btn" data-tab="storage-tab">PC Storage</button>
            <button class="tab-btn" data-tab="items-tab">Items</button>
        </nav>

        <header class="main-header">
            <h1 id="tab-header">Encounter</h1>
        </header>

        <div id="generator-tab" class="tab-content active-content">

            <div class="status-container">
                <div class="status-box">
                    <span class="label">Location:</span>
                    <span id="current-location" class="value">---</span>
                </div>
            </div>

            <main class="card" id="pokemon-card">
                <div class="sprite-container">
                    <div class="sprite-background"></div>
                    <div id="loader" class="loader hidden"></div>
                    <div id="catch-feedback-container" class="hidden">
                        <div id="catch-feedback"></div>
                    </div>
                    <img id="pokemon-sprite"
                        src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png"
                        alt="Mystery Pokémon" class="sprite">
                </div>

                <div class="info-container">
                    <div class="id-badge">#<span id="pokemon-id">???</span></div>
                    <h2 id="pokemon-name">???</h2>
                    <div id="pokemon-types" class="types-container">
                        <!-- Types will be injected here -->
                    </div>
                    <div id="pokemon-ability-container" class="ability-container hidden">
                        <span class="ability-label">Ability:</span>
                        <span id="pokemon-ability" class="ability-name">---</span>
                    </div>
                </div>
            </main>

            <div class="action-buttons">
                <button id="catch-btn" class="primary-btn" disabled>Catch</button>
                <button id="generate-btn" class="primary-btn">
                    <span class="btn-text">Find Next</span>
                    <div class="btn-glow"></div>
                </button>
            </div>
        </div>

        <div id="storage-tab" class="tab-content hidden">
            <div id="storage-grid" class="storage-grid">
                <!-- Pokémon will be injected here -->
            </div>
            <div class="pagination">
                <button id="prev-page" class="tab-btn">Prev</button>
                <span id="page-info">Page 1</span>
                <button id="next-page" class="tab-btn">Next</button>
            </div>
        </div>

        <div id="items-tab" class="tab-content hidden">
            <div class="coming-soon">
                <p>Coming Soon...</p>
            </div>
        </div>

    </div>

    <audio id="pokemon-cry" preload="auto"></audio>

    <script type="module" src="/script.ts"></script>
</body>

</html>
